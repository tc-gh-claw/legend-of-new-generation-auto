<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新世代傳說 | Legend of the New Generation</title>
    
    <!-- Google Fonts - 插畫風格字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            max-width: 100%;
            background: linear-gradient(180deg, #2d3561 0%, #1a1f3a 100%);
            border: 4px solid #e94560;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.4), 
                        inset 0 0 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .game-title {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', cursive;
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            letter-spacing: 2px;
        }
        
        .game-subtitle {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1rem;
            color: #a0a0c0;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 300;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-family: 'Noto Sans TC', sans-serif;
            color: #e94560;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 850px) {
            #game-container {
                width: 100%;
                height: auto;
                aspect-ratio: 4/3;
            }
            
            .game-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="game-title">⚔️ 新世代傳說 ⚔️</h1>
    <p class="game-subtitle">Legend of the New Generation - 全科知識RPG冒險</p>
    
    <div id="game-container">
        <div class="loading">🎮 載入中...</div>
    </div>

    <!-- Phaser 3 Game Engine -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    
    <!-- Game Scripts - v1.9.0 冰霜元素版 -->
    <script src="js/systems/AudioManager.js?v=10"></script>
    <script src="js/systems/TimeFreezeSkill.js?v=10"></script>
    <script src="js/systems/WeatherSystem.js?v=10"></script>
    <script src="js/scenes/AchievementSystem.js?v=10"></script>
    <script src="js/scenes/BootScene.js?v=10"></script>
    <script src="js/scenes/MenuScene.js?v=10"></script>
    <script src="js/scenes/SettingsScene.js?v=10"></script>
    <script src="js/scenes/WorldScene.js?v=10"></script>
    <script src="js/scenes/VillageScene.js?v=10"></script>
    <script src="js/scenes/ForestScene.js?v=10"></script>
    <script src="js/scenes/BossScene.js?v=10"></script>
    <script src="js/scenes/BattleScene.js?v=10"></script>
    <script src="js/scenes/QuizScene.js?v=10"></script>
    <script src="js/scenes/ShopScene.js?v=10"></script>
    <script src="js/scenes/InventorySystem.js?v=10"></script>
    <script src="js/scenes/QuestSystem.js?v=10"></script>
    <script src="js/scenes/LevelUpScene.js?v=10"></script>
    <script src="js/main.js?v=10"></script>
</body>
</html>
